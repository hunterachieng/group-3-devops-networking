name: Container CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Job 1: per-service tests + local image build ──────────────────────────
  verify:
    name: Verify ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # let all three run even if one fails
      matrix:
        include:
          - service: order
            test_file: tests/test_order.py
          - service: inventory
            test_file: tests/test_inventory.py
          - service: payment
            test_file: tests/test_payment.py

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            psenv/requirements.txt
            psenv/requirements-dev.txt

      - name: Install dependencies
        working-directory: psenv
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        working-directory: psenv
        run: python -m pytest ${{ matrix.test_file }} -v

      - name: Build Docker image locally
        run: |
          docker build \
            -t ${{ matrix.service }}:${{ github.sha }} \
            -f Dockerfile \
            .

  # ── Job 2: full compose stack verification ────────────────────────────────
  verify-compose:
    name: Verify Docker Compose stack
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate dev Compose file
        run: docker compose config -q

      - name: Validate prod Compose file
        # Prod uses fail-loud ${VAR:?} variables; dummy values let the file
        # render so the production topology is validated in CI, not just dev.
        run: docker compose -f docker-compose.prod.yml config -q
        env:
          IMAGE_TAG: sha-ci00000
          DOCKERHUB_USERNAME: ci-dummy
          APP_NAME: ci-dummy

      - name: Build Compose stack
        run: docker compose build --pull

      - name: Start Compose stack (wait for healthchecks)
        run: docker compose up -d --wait --wait-timeout 180

      - name: Show running services
        run: docker compose ps

      - name: Check gateway health
        # --wait above gates on each container's own healthcheck, but nginx has
        # no healthcheck and that only proves containers are up — not that the
        # gateway actually serves traffic from the host. This retry loop is the
        # end-to-end external check: poll the public gateway until it answers.
        run: |
          echo "Waiting for the gateway to serve traffic..."
          for i in $(seq 1 12); do
            if curl --fail -s http://localhost:8080/health; then
              echo ""
              echo "Gateway is healthy."
              exit 0
            fi
            echo "Attempt $i/12 — retrying in 5s"
            sleep 5
          done
          echo "Gateway did not become healthy in time"
          exit 1

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop Compose stack
        if: always()
        run: docker compose down -v

  # ── Job 3: publish to Docker Hub on push to main only ─────────────────────
  publish:
    name: Publish ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: verify-compose
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - service: order
          - service: inventory
          - service: payment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set short commit hash
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-${{ matrix.service }}:sha-${{ env.SHORT_SHA }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Write deployment summary
        run: |
          echo "### Published Image" >> "$GITHUB_STEP_SUMMARY"
          echo "**Service:** ${{ matrix.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** \`${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-${{ matrix.service }}:sha-${SHORT_SHA}\`" >> "$GITHUB_STEP_SUMMARY"

  # ── Job 4: write the real deployment record back into README.md ───────────
  record-deployment:
    name: Record deployment
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set short commit hash
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Update deployment record in README
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python3 scripts/update_deployment_record.py \
            --commit "${{ github.sha }}" \
            --tag "sha-${SHORT_SHA}" \
            --run-url "$RUN_URL" \
            --dockerhub-username "${{ vars.DOCKERHUB_USERNAME }}" \
            --app-name "${{ github.event.repository.name }}"

      - name: Open PR with updated deployment record
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update deployment record for ${{ env.SHORT_SHA }}"
          branch: "bot/deployment-record-${{ env.SHORT_SHA }}"
          delete-branch: true
          title: "chore: deployment record for ${{ env.SHORT_SHA }}"
          body: "Automated update of the deployment record for commit ${{ github.sha }}."
          add-paths: README.md
