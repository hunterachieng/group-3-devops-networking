map $http_x_request_id $req_id {
    default   $http_x_request_id;
    ""        $request_id;
}

log_format json_combined escape=json
    '{'
        '"timestamp":"$time_iso8601",'
        '"service":"nginx",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"request_id":"$req_id",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status"'
    '}';

upstream order_backend {
    server order:3001;
}

server {
    listen 80;
    server_name _;

    server_tokens off;

    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-Frame-Options        "DENY"         always;
    add_header Referrer-Policy        "no-referrer"  always;

    access_log /dev/stdout json_combined;
    error_log  /dev/stderr warn;

    location /checkout {
        proxy_pass http://order_backend/checkout;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $req_id;
        proxy_set_header X-Order-ID $http_x_order_id;
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    location /health {
        proxy_pass http://order_backend/health;
        proxy_set_header X-Request-ID $req_id;
    }

    location /ready {
        proxy_pass http://order_backend/ready;
        proxy_set_header X-Request-ID $req_id;
    }

    # Controlled-failure endpoints for load/fault testing.
    # These proxy to Order's fault-injection routes, which only exist when
    # ENABLE_FAILURE_ENDPOINTS is set on the service (dev compose only).
    # /dependency-fail cascades Order -> Inventory to show a broken trace.
    location ~ ^/(fail|slow|error|dependency-fail)$ {
        proxy_pass http://order_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $req_id;
        proxy_set_header X-Order-ID $http_x_order_id;
        proxy_connect_timeout 5s;
        proxy_read_timeout    35s;
    }

    location / {
        default_type application/json;
        return 404 '{"error":"not found","path":"$request_uri"}';
    }
}
