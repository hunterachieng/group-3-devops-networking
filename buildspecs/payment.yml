version: 0.2
#
# Payment service delivery buildspec (Phase 5).
# Runs in CodeBuild (privileged mode ON) as the Build stage of
# devops-g3-payment-pipeline. Source arrives as a CodePipeline zip artifact
# (no .git), so the commit SHA comes from CODEBUILD_RESOLVED_SOURCE_VERSION,
# NOT `git rev-parse` (which fails in the pipeline — this replaces the
# earlier draft that used `git rev-parse --short HEAD`).
#
# Self-contained: account is derived at runtime and region comes from the
# build environment, so the CodeBuild project needs no extra env config.

env:
  variables:
    ECR_REPO: devops-g3-payment
    CONTAINER_NAME: payment
    SERVICE_DIR: payment

phases:
  pre_build:
    commands:
      - AWS_REGION=${AWS_DEFAULT_REGION:-us-west-1}
      - ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
      - REPO=$ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO
      - SHA=$(echo ${CODEBUILD_RESOLVED_SOURCE_VERSION:-dev} | cut -c1-7)
      - IMAGE_URI=$REPO:$SHA
      - echo "Building $CONTAINER_NAME  SHA=$SHA  ->  $IMAGE_URI"
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com

  build:
    commands:
      - echo Validating source...
      - if [ -d "$SERVICE_DIR/tests" ]; then pip install -r $SERVICE_DIR/requirements.txt && python -m pytest $SERVICE_DIR/tests; else python -m py_compile $SERVICE_DIR/app.py; fi
      - echo Building image for linux/amd64...
      - docker build --platform linux/amd64 --build-arg GIT_SHA=$SHA -t $IMAGE_URI ./$SERVICE_DIR

  post_build:
    commands:
      - docker push $IMAGE_URI
      - printf '[{"name":"%s","imageUri":"%s"}]' "$CONTAINER_NAME" "$IMAGE_URI" > imagedefinitions.json
      - cat imagedefinitions.json
      - echo Build complete. Pushed $IMAGE_URI

artifacts:
  files:
    - imagedefinitions.json