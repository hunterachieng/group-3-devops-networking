# Containerized e-commerce pipeline.
#
# Service-name mapping for the assignment (A/B/C -> domain names):
#   Service A = order      Service B = inventory      Service C = payment
#
# Properties preserved from the VM version:
#   - Nginx is the ONLY container that publishes a host port (8080 -> 80).
#   - inventory & payment publish NO ports -> unreachable from the host.
#   - Services find each other by Compose service name (DNS), not localhost/IP.
#   - Logs go to stdout -> visible via `docker compose logs`.
#   - X-Request-ID is traced across nginx + all three services.
#   - Stopping inventory yields a clean 502 and recovers when restarted.

services:
  order:                                
    build: .
    image: psenv-service:latest
    command: >
      gunicorn
        --config gunicorn.conf.py
        --bind 0.0.0.0:3001
        --workers 2
        --threads 4
        --access-logfile -
        --error-logfile -
        services.order.app:app
    environment:
      BIND_HOST: "0.0.0.0"
      SERVICE_PORT: "3001"
      INVENTORY_URL: http://inventory:3002
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    restart: unless-stopped
    stop_grace_period: 35s
    depends_on:
      inventory:
        condition: service_healthy
      payment:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks: [appnet]

  inventory:                              
    build: .
    image: psenv-service:latest
    command: >
      gunicorn
        --config gunicorn.conf.py
        --bind 0.0.0.0:3002
        --workers 2
        --threads 4
        --access-logfile -
        --error-logfile -
        services.inventory.app:app
    environment:
      BIND_HOST: "0.0.0.0"
      SERVICE_PORT: "3002"
      PAYMENT_URL: http://payment:3003
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    restart: unless-stopped
    stop_grace_period: 35s
    depends_on:
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3002/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks: [appnet]

  payment:                               
    build: .
    image: psenv-service:latest
    command: >
      gunicorn
        --config gunicorn.conf.py
        --bind 0.0.0.0:3003
        --workers 2
        --threads 4
        --access-logfile -
        --error-logfile -
        services.payment.app:app
    environment:
      BIND_HOST: "0.0.0.0"
      SERVICE_PORT: "3003"
      ORDER_URL: http://order:3001
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    restart: unless-stopped
    stop_grace_period: 35s
    depends_on:
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3003/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks: [appnet]

  jaeger:
    image: jaegertracing/all-in-one:1.69.0
    ports:
      - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    restart: unless-stopped
    networks: [appnet]

  nginx:
    image: nginx:1.27.5-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.compose.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      order:
        condition: service_healthy         
    restart: unless-stopped
    networks: [appnet]

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    depends_on:
      order:
        condition: service_healthy
      inventory:
        condition: service_healthy
      payment:
        condition: service_healthy
    restart: unless-stopped
    networks: [appnet]
    # No host port published on purpose - keeps the "only nginx is
    # internet-facing" invariant intact. See "Viewing the Prometheus UI"
    # note below if you want to browse it during development.

networks:
  appnet:
    driver: bridge

volumes:
  prometheus-data: