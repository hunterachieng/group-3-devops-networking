# Reverse proxy for the e-commerce pipeline.
#
# Nginx is the ONE public entry point. It listens on port 80 and forwards
# traffic to the Order service only. There is deliberately NO location block
# for Inventory (3002) or Payment (3003), so they cannot be reached through
# Nginx - the proxy itself enforces "only Order is public".
#
# This file is included from within the http{} block of nginx.conf
# (Ubuntu does this via sites-enabled/), so map/log_format belong here.

# Start the distributed trace at the true front door: reuse a client-supplied
# X-Request-ID if present, otherwise generate Nginx's built-in per-request id.
map $http_x_request_id $trace_id {
    default $http_x_request_id;
    ""      $request_id;
}

# Custom access log that records the trace id, so Nginx logs can be correlated
# with the JSON logs from the services using the same id.
log_format traced '$remote_addr [$time_iso8601] "$request" '
                  'status=$status trace=$trace_id '
                  'upstream=$upstream_addr rt=${request_time}s';

server {
    listen 80 default_server;
    server_name _;

    server_tokens off;

    access_log /var/log/nginx/ecommerce_access.log traced;
    error_log  /var/log/nginx/ecommerce_error.log;

    # Everything goes to Order, referenced by its DISCOVERY NAME (not an IP).
    location / {
        proxy_pass http://order.internal:3001;

        # Standard proxy headers so Order sees the real client, not Nginx.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Propagate (or originate) the trace id into the service chain.
        proxy_set_header X-Request-ID      $trace_id;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
