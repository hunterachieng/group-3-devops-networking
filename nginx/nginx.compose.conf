# Nginx config for the Docker Compose stack.
# Mounted at /etc/nginx/conf.d/default.conf (included inside http{}).
#
# Differences from the VM config: upstream is the Compose service name `order`
# (not order.internal), and logs go to stdout/stderr so `docker compose logs
# nginx` shows them.

# Originate the trace at the front door: reuse a client X-Request-ID or generate one.
map $http_x_request_id $trace_id {
    default $http_x_request_id;
    ""      $request_id;
}

log_format traced '$remote_addr [$time_iso8601] "$request" '
                  'status=$status trace=$trace_id '
                  'upstream=$upstream_addr rt=${request_time}s';

server {
    listen 80 default_server;
    server_name _;

    # Send access/error logs to the container's stdout/stderr.
    access_log /dev/stdout traced;
    error_log  /dev/stderr;

    # Only Order is proxied. inventory/payment have no route here.
    location / {
        proxy_pass http://order:3001;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $trace_id;

        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }
}
